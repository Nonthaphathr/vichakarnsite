<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>เว็บไซต์กลุ่มบริหารงาน</title>
<link rel="icon" id="favicon" href="data:,">

<!-- ฟอนต์ไทย: Mitr (หัวข้อ) + Sarabun (เนื้อหา ฟอนต์ราชการ) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<!-- Firebase (compat) ผ่าน CDN — ใช้ได้ในไฟล์เดียว ทำงานใน iframe ของ Google Sites -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
/* ============================================================
   1) ตัวแปรธีม (CSS variables) — ผู้ดูแลแก้ค่าได้จากหน้าเว็บ
   ค่าเริ่มต้น: เขียวสถาบัน + ทองอ่อน บนพื้นครีม (ทางการแต่อบอุ่น)
   ============================================================ */
:root{
  --bg:#f6f2e9;
  --surface:#fffdf8;
  --ink:#22302a;
  --muted:#6c7a72;
  --primary:#1f4d3a;
  --primary-2:#2c6a4f;
  --accent:#c19a3e;
  --line:#e6ddcc;
  --radius:18px;
  --shadow:0 18px 40px -22px rgba(31,77,58,.45);
  --font-head:'Mitr',sans-serif;
  --font-body:'Sarabun',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font-body);
  color:var(--ink);
  background:var(--bg);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4,.head{font-family:var(--font-head);font-weight:500;line-height:1.25}
button{font-family:inherit;cursor:pointer}
img{max-width:100%;display:block}
a{color:var(--primary-2)}

/* ============================================================
   2) หน้า LANDING (จอแรก) — แอนิเมชันด้วย CSS ล้วน เบาๆ
   ============================================================ */
#landing{
  position:fixed;inset:0;z-index:50;
  display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(60% 70% at 18% 20%, rgba(44,106,79,.30), transparent 60%),
    radial-gradient(55% 65% at 85% 80%, rgba(193,154,62,.28), transparent 60%),
    linear-gradient(140deg,#16352a,#1f4d3a 55%,#16352a);
  overflow:hidden;
  transition:opacity .7s ease, visibility .7s ease;
}
#landing.hide{opacity:0;visibility:hidden;pointer-events:none}
/* วงกลมเบลอลอยพื้นหลัง */
#landing .orb{position:absolute;border-radius:50%;filter:blur(40px);opacity:.5;animation:float 12s ease-in-out infinite}
#landing .orb.a{width:280px;height:280px;background:#3a8a64;top:-60px;left:-40px}
#landing .orb.b{width:340px;height:340px;background:#d8b25a;bottom:-90px;right:-60px;animation-delay:-4s}
#landing .orb.c{width:200px;height:200px;background:#2c6a4f;top:40%;left:60%;animation-delay:-8s}
@keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-30px)}}
.cover{
  position:relative;text-align:center;color:#fff;padding:40px 28px;max-width:560px;
}
.cover .logo-ring{
  width:104px;height:104px;margin:0 auto 26px;border-radius:50%;
  display:grid;place-items:center;overflow:hidden;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.35);
  backdrop-filter:blur(6px);
  opacity:0;transform:translateY(16px);animation:rise .7s .1s forwards}
.cover .logo-ring img{width:100%;height:100%;object-fit:cover}
.cover .logo-ring span{font-family:var(--font-head);font-size:38px;color:#fff}
.cover h1{font-size:clamp(28px,6vw,46px);font-weight:600;letter-spacing:.5px;
  opacity:0;transform:translateY(16px);animation:rise .7s .25s forwards}
.cover .tagline{margin-top:12px;font-size:clamp(15px,2.4vw,19px);color:rgba(255,255,255,.85);font-weight:300;
  opacity:0;transform:translateY(16px);animation:rise .7s .4s forwards}
.cover .line{width:60px;height:3px;background:var(--accent);margin:22px auto;border-radius:3px;
  opacity:0;animation:fade .8s .55s forwards}
.enter-btn{
  margin-top:8px;border:none;border-radius:999px;padding:15px 38px;
  font-family:var(--font-head);font-size:18px;color:#16352a;
  background:linear-gradient(180deg,#f2d98a,var(--accent));
  box-shadow:0 14px 30px -10px rgba(193,154,62,.7);
  opacity:0;transform:translateY(16px);animation:rise .7s .7s forwards;
  transition:transform .2s, box-shadow .2s}
.enter-btn:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 18px 36px -10px rgba(193,154,62,.85)}
@keyframes rise{to{opacity:1;transform:none}}
@keyframes fade{to{opacity:1}}
body.no-anim #landing .orb{animation:none}
body.no-anim .cover *{animation:none!important;opacity:1!important;transform:none!important}

/* ============================================================
   3) โครงแอป (SPA)
   ============================================================ */
#app{min-height:100%;display:flex;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:20;background:var(--surface);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:14px;padding:12px 18px}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.brand .badge{width:44px;height:44px;border-radius:12px;flex:0 0 auto;overflow:hidden;
  display:grid;place-items:center;background:var(--primary);color:#fff;font-family:var(--font-head)}
.brand .badge img{width:100%;height:100%;object-fit:cover}
.brand .name{font-family:var(--font-head);font-size:18px;color:var(--primary);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand .sub{font-size:12px;color:var(--muted)}
.topbar .spacer{flex:1}
.gear{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);
  background:transparent;color:var(--muted);font-size:18px;display:grid;place-items:center;transition:.2s;flex:0 0 auto}
.gear+.gear{margin-left:8px}
.gear:hover{color:var(--primary);border-color:var(--primary)}

/* ประกาศสำคัญหน้าเว็บ */
.announce{display:none;align-items:center;gap:10px;padding:11px 16px;background:var(--accent);
  color:#3a2c08;font-size:14.5px;font-weight:600;line-height:1.5}
.announce.show{display:flex}
.announce .ann-ic{flex:0 0 auto;font-size:18px}
.announce .ann-txt{flex:1;min-width:0}
.announce .ann-x{flex:0 0 auto;border:none;background:rgba(0,0,0,.12);color:#3a2c08;border-radius:8px;
  width:26px;height:26px;cursor:pointer;font-size:16px;line-height:1}
.announce .ann-x:hover{background:rgba(0,0,0,.22)}

/* QR modal */
.qr-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center}
.qr-canvas{background:#fff;padding:12px;border-radius:14px;border:1px solid var(--line);min-height:120px;
  display:grid;place-items:center}
.qr-canvas img,.qr-canvas canvas{display:block;border-radius:6px}
.qr-url{width:100%;word-break:break-all;background:var(--bg);border:1px solid var(--line);
  border-radius:10px;padding:10px 12px;font-size:13px;color:var(--muted)}
.qr-acts{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
/* คู่มือ */
.guide{font-size:14.5px;line-height:1.7}
.guide h4{font-family:var(--font-head);color:var(--primary);margin:14px 0 6px;font-size:16px}
.guide ol{margin:0 0 4px;padding-left:20px}.guide ol li{margin-bottom:6px}
.guide .step{display:flex;gap:10px;align-items:flex-start;background:var(--surface);border:1px solid var(--line);
  border-radius:12px;padding:12px 14px;margin-bottom:10px}
.guide .step .n{flex:0 0 auto;width:26px;height:26px;border-radius:50%;background:var(--primary);color:#fff;
  display:grid;place-items:center;font-weight:700;font-size:13px}
.guide .step .c{flex:1}.guide .step .c b{color:var(--primary)}
.guide .tip{background:#fff7e6;border:1px solid #f0d9a0;border-radius:10px;padding:10px 12px;color:#7a5c10;font-size:13.5px}

/* แถบแท็บ — ตรึงไว้ใต้แถบชื่อเมื่อเลื่อนหน้า */
.tabbar{position:sticky;top:0;z-index:19;display:flex;gap:6px;overflow-x:auto;padding:10px 14px;background:var(--surface);
  border-bottom:1px solid var(--line);scrollbar-width:thin;box-shadow:0 4px 10px -8px rgba(0,0,0,.35)}
.tabbar::-webkit-scrollbar{height:6px}
.tabbar::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px}
.tab{flex:0 0 auto;border:none;background:transparent;color:var(--muted);
  padding:9px 16px;border-radius:999px;font-size:15px;font-weight:500;white-space:nowrap;transition:.2s}
.tab:hover{color:var(--ink);background:rgba(31,77,58,.06)}
.tab.active{color:#fff;background:var(--primary)}
.tab .x{margin-left:8px;opacity:.7;font-size:13px}
.addtab{flex:0 0 auto;border:1px dashed var(--accent);background:transparent;color:var(--accent);
  padding:8px 14px;border-radius:999px;font-size:14px;font-weight:500}

/* พื้นที่เนื้อหา */
.main{flex:1;width:100%;max-width:1040px;margin:0 auto;padding:26px 18px 60px}
.section-head{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.section-head h2{font-size:24px;color:var(--primary);flex:1}
.muted{color:var(--muted)}
.empty{text-align:center;color:var(--muted);padding:48px 10px;border:1px dashed var(--line);border-radius:var(--radius)}

/* hero หน้าหลัก */
.hero{position:relative;border-radius:var(--radius);overflow:hidden;color:#fff;
  background:linear-gradient(120deg,var(--primary),var(--primary-2));padding:42px 30px;margin-bottom:26px;box-shadow:var(--shadow)}
.hero::after{content:"";position:absolute;right:-40px;top:-40px;width:200px;height:200px;border-radius:50%;
  background:rgba(255,255,255,.10)}
.hero h2{color:#fff;font-size:clamp(22px,4vw,32px)}
.hero p{margin-top:10px;max-width:560px;color:rgba(255,255,255,.9);font-weight:300}

/* การ์ด (บุคลากร / การ์ดทั่วไป) */
.grid{display:grid;gap:18px;grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  overflow:hidden;box-shadow:var(--shadow);transition:transform .2s}
.card:hover{transform:translateY(-3px)}
.card .photo{aspect-ratio:1/1;background:#e9e2d2 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80"><circle cx="40" cy="30" r="16" fill="%23cdbfa0"/><rect x="14" y="52" width="52" height="26" rx="13" fill="%23cdbfa0"/></svg>') center/40% no-repeat;}
.card .photo img{width:100%;height:100%;object-fit:cover}
.card .body{padding:14px 16px}
.card .body .t{font-family:var(--font-head);font-size:17px;color:var(--ink)}
.card .body .r{color:var(--primary-2);font-size:14px;font-weight:600;margin-top:2px}
.card .body .d{color:var(--muted);font-size:13px;margin-top:6px}
.card.clickable{cursor:pointer;text-decoration:none;color:inherit;display:block}
.card-btn{display:inline-block;margin-top:12px;background:var(--primary);color:#fff;
  text-decoration:none;border-radius:8px;padding:8px 16px;font-size:13.5px;font-weight:600}
.card-btn:hover{background:var(--primary-2)}

/* ลิงก์ฟอร์ม */
.linklist{display:flex;flex-direction:column;gap:14px}
.linkrow{display:flex;align-items:center;gap:16px;background:var(--surface);border:1px solid var(--line);
  border-radius:14px;padding:16px 18px;box-shadow:var(--shadow)}
.linkrow .ic{width:44px;height:44px;border-radius:12px;flex:0 0 auto;display:grid;place-items:center;
  background:rgba(193,154,62,.16);color:var(--accent);font-size:20px}
.linkrow .info{flex:1;min-width:0}
.linkrow .info .t{font-family:var(--font-head);font-size:16px}
.linkrow .info .d{color:var(--muted);font-size:13px}
.btn-go{border:none;background:var(--primary);color:#fff;border-radius:10px;padding:9px 16px;font-size:14px;text-decoration:none}
.embed-wrap{margin-top:10px;border-radius:12px;overflow:hidden;border:1px solid var(--line)}
.embed-wrap iframe{width:100%;height:520px;border:0;display:block}

/* เอกสาร/ไฟล์ดาวน์โหลด */
.filelist{display:flex;flex-direction:column;gap:14px}
.filerow{display:flex;align-items:center;gap:16px;background:var(--surface);border:1px solid var(--line);
  border-radius:14px;padding:16px 18px;box-shadow:var(--shadow)}
.filerow .fic{width:48px;height:48px;border-radius:12px;flex:0 0 auto;display:grid;place-items:center;font-size:22px;color:#fff}
.filerow .fic.pdf{background:#c0392b}.filerow .fic.doc{background:#2b6cb0}
.filerow .fic.xls{background:#2f855a}.filerow .fic.ppt{background:#d35400}.filerow .fic.other{background:var(--muted)}
.filerow .finfo{flex:1;min-width:0}
.filerow .finfo .t{font-family:var(--font-head);font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.filerow .finfo .d{color:var(--muted);font-size:13px}
.filerow .finfo .meta{color:var(--accent);font-size:12px;font-weight:600;margin-top:2px}
.filerow .facts{display:flex;gap:8px;flex:0 0 auto;flex-wrap:wrap;align-items:center}
.btn-dl{border:none;background:var(--primary);color:#fff;border-radius:10px;padding:9px 16px;font-size:14px;text-decoration:none;white-space:nowrap}
.btn-dl:hover{background:var(--primary-2)}
.btn-view{border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:10px;padding:9px 14px;font-size:14px;text-decoration:none;white-space:nowrap}
.btn-view:hover{border-color:var(--primary);color:var(--primary)}
@media(max-width:560px){.filerow{flex-wrap:wrap}.filerow .facts{width:100%}}

/* ข่าว */
.newslist{display:flex;flex-direction:column;gap:18px}
.news{display:flex;gap:18px;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.news .nimg{width:200px;flex:0 0 auto;background:#e9e2d2}
.news .nimg img{width:100%;height:100%;object-fit:cover}
.news .nbody{padding:18px 20px;flex:1}
.news .date{display:inline-block;font-size:12px;color:var(--accent);font-weight:600;letter-spacing:.5px}
.news h3{font-size:19px;margin:4px 0 8px}
.news p{color:var(--muted);font-size:14.5px;white-space:pre-wrap}
@media(max-width:640px){.news{flex-direction:column}.news .nimg{width:100%;height:180px}}

/* เนื้อหาอิสระ */
.content-block{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:24px;box-shadow:var(--shadow);white-space:pre-wrap;font-size:15.5px}

/* ปุ่มแก้ไขเล็กบนการ์ด */
.item-tools{display:flex;gap:8px;padding:0 16px 14px}
.mini{border:1px solid var(--line);background:var(--surface);border-radius:8px;padding:6px 12px;font-size:13px;color:var(--muted)}
.mini:hover{border-color:var(--primary);color:var(--primary)}
.mini.del:hover{border-color:#c0392b;color:#c0392b}
.add-pill{border:1px dashed var(--accent);background:transparent;color:var(--accent);
  border-radius:12px;padding:14px;font-size:15px;width:100%;font-weight:500}

/* แถบโหมดแก้ไข */
#editbar{display:none;position:sticky;top:0;z-index:25;background:var(--accent);color:#3a2c08;
  text-align:center;padding:8px 14px;font-size:14px;font-weight:600}
#editbar button{margin-left:10px;border:none;background:#3a2c08;color:#fff;border-radius:8px;padding:6px 14px;font-size:13px}
body.editing #editbar{display:block}

/* ============================================================
   4) Modal + ฟอร์ม
   ============================================================ */
.overlay{position:fixed;inset:0;z-index:60;background:rgba(20,30,25,.55);
  display:none;align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(2px)}
.overlay.show{display:flex}
.modal{background:var(--surface);width:100%;max-width:460px;border-radius:20px;overflow:hidden;
  box-shadow:0 30px 70px -20px rgba(0,0,0,.5);max-height:90vh;display:flex;flex-direction:column}
.modal .mhead{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center}
.modal .mhead h3{font-size:18px;color:var(--primary);flex:1}
.modal .mhead .close{border:none;background:transparent;font-size:22px;color:var(--muted)}
.modal .mbody{padding:20px 22px;overflow:auto}
.field{margin-bottom:14px}
.field label{display:block;font-size:13.5px;color:var(--muted);margin-bottom:5px;font-weight:600}
.field input[type=text],.field input[type=url],.field input[type=date],.field input[type=password],
.field textarea,.field select{
  width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-family:inherit;font-size:15px;background:#fff;color:var(--ink)}
.field textarea{min-height:110px;resize:vertical}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--primary)}
.field .hint{font-size:12px;color:var(--muted);margin-top:4px}
.color-row{display:flex;gap:14px}
.color-row .field{flex:1}
.color-row input[type=color]{width:100%;height:42px;border:1px solid var(--line);border-radius:10px;background:#fff;padding:4px}
.uprow{display:flex;gap:10px;align-items:center}
.uprow input[type=file]{font-size:13px;flex:1}
.thumb{width:46px;height:46px;border-radius:8px;object-fit:cover;border:1px solid var(--line);display:none}
.mfoot{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
.btn{border:none;border-radius:10px;padding:11px 20px;font-size:15px;font-weight:600}
.btn.primary{background:var(--primary);color:#fff}
.btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}

/* แบนเนอร์แจ้งสถานะ (เช่น ยังไม่ตั้งค่า) */
#status{display:none;background:#fff4d6;color:#7a5b10;border-bottom:1px solid #ecd9a0;
  padding:9px 16px;font-size:13.5px;text-align:center}
#status.show{display:block}

/* loading skeleton */
.sk{height:120px;border-radius:var(--radius);background:linear-gradient(90deg,#ece5d6,#f5efe2,#ece5d6);
  background-size:200% 100%;animation:shimmer 1.3s infinite}
@keyframes shimmer{to{background-position:-200% 0}}

.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:11px 20px;border-radius:999px;font-size:14px;
  opacity:0;transition:.3s;z-index:80}
.toast.show{opacity:1;transform:translateX(-50%)}

/* ============================================================
   บล็อกเนื้อหา (หน้าหลัก) + ภาพกิจกรรม + lightbox
   ============================================================ */
.blocks{display:flex;flex-direction:column;gap:26px}
.block-heading{font-family:var(--font-head);font-size:21px;color:var(--primary);margin-bottom:12px}
.block-text{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:22px 24px;box-shadow:var(--shadow);white-space:pre-wrap;font-size:15.5px}
.block-tools{display:flex;gap:8px;margin-top:10px}
.block-wrap{position:relative}
/* ลากจัดลำดับ */
.dragging{opacity:.4}
body.editing .tab{cursor:grab}
body.editing .block-wrap{cursor:grab}
body.editing .block-wrap::before{content:"⠿ ลาก/ใช้ ▲▼ จัดลำดับ";position:absolute;top:-9px;left:12px;z-index:6;
  background:var(--accent);color:#3a2c08;font-size:11px;font-weight:600;padding:2px 9px;border-radius:999px;pointer-events:none}

/* textbox พร้อมเอฟเฟค + label */
.textbox{position:relative;border-radius:var(--radius);padding:20px 22px;font-size:15.5px;line-height:1.7;
  margin-top:6px;animation:tbpop .35s ease}
@keyframes tbpop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.textbox .tb-label{display:inline-block;font-family:var(--font-head);font-size:13px;font-weight:700;
  padding:3px 12px;border-radius:999px;margin-bottom:10px}
.textbox .tb-body{white-space:pre-wrap}
.tb-info{background:#eaf4ff;border:1px solid #bcdcff;color:#16456e}
.tb-info .tb-label{background:#2b6cb0;color:#fff}
.tb-success{background:#e9f8ef;border:1px solid #b5e6c9;color:#1c6b3f}
.tb-success .tb-label{background:#2f855a;color:#fff}

/* แกลเลอรีรูป (grid + อัลบั้ม) */

@keyframes upbar{0%{margin-left:-42%}100%{margin-left:102%}}
</style>
</head>

<script>
/* ============================================================
   ★★★ บล็อก CONFIG — แก้เฉพาะตรงนี้ต่อโรงเรียน/กลุ่มงาน ★★★
   (ถ้าปล่อยว่าง เว็บจะรันใน "โหมดสาธิต" ด้วยข้อมูลตัวอย่างทันที)
   ============================================================ */
const CONFIG = {
  // ★★★ แก้เฉพาะก้อนนี้ก้อนเดียวต่อโรงเรียน ★★★
  // วาง Firebase config ของคุณที่นี่ (Project settings > Your apps)
  // ถ้าปล่อยว่าง เว็บจะรันใน "โหมดสาธิต" ทันที
  firebaseConfig: {
    apiKey: "AIzaSyCE61cgTJEqCtP0Td-To4R5olwarvyHtuM",
    authDomain: "websitevichakarn.firebaseapp.com",
    projectId: "websitevichakarn",
    storageBucket: "websitevichakarn.firebasestorage.app",
    messagingSenderId: "66518021731",
    appId: "1:66518021731:web:1e8989a30152a1f4166a56"
  }
  // หมายเหตุ: โฟลเดอร์ Drive / Apps Script URL / Sheet ID / PIN
  // ไม่ต้องแก้ในโค้ดแล้ว — ไปกรอกที่ "โหมดผู้ดูแล > ตั้งค่า" (เก็บใน Firestore)
};
const ADMIN_PIN_DEFAULT = "1234"; // PIN เริ่มต้นครั้งแรก (เปลี่ยนได้จากหน้าตั้งค่า)

/* ============================================================
   ชนิดของแท็บ -> วิธีแสดงผล (kind) และที่เก็บข้อมูล (store)
   ============================================================ */
const TAB_KINDS = {
  home:      {kind:'content', label:'หน้าหลัก',      store:{doc:'content/home'}},
  personnel: {kind:'card',    label:'บุคลากร',        store:{col:'personnel'}},
  forms:     {kind:'link',    label:'แบบฟอร์ม',       store:{col:'forms'}},
  news:      {kind:'news',    label:'ข่าวสาร/ประกาศ', store:{col:'news'}},
  // ชนิดที่ผู้ดูแลเพิ่มเองได้:
  content:   {kind:'content', label:'เนื้อหาอิสระ',   store:{docFromTab:true}},
  cards:     {kind:'card',    label:'การ์ด/รายชื่อ',  store:{col:'items', filterTab:true}},
  links:     {kind:'link',    label:'ลิงก์/ฟอร์ม',    store:{col:'linkitems', filterTab:true}},
  files:     {kind:'file',    label:'เอกสาร/ไฟล์',    store:{col:'fileitems', filterTab:true}},
  gallery:   {kind:'gallery', label:'ภาพกิจกรรม',     store:{col:'galleryitems', filterTab:true}},
};

/* ============================================================
   ชั้นข้อมูล (Store) — รองรับ 2 โหมด
   - firestore : เมื่อใส่ CONFIG.firebaseConfig.projectId แล้ว
   - memory    : โหมดสาธิต (ข้อมูลตัวอย่างในหน่วยความจำ) เพื่อให้พรีวิวได้
   ============================================================ */
const HAS_FB = !!(CONFIG.firebaseConfig && CONFIG.firebaseConfig.projectId);
let db = null;
if (HAS_FB) {
  try { firebase.initializeApp(CONFIG.firebaseConfig); db = firebase.firestore(); }
  catch(e){ console.error('Firebase init error', e); }
}

const Store = {
  mode: (HAS_FB && db) ? 'firestore' : 'memory',
  mem: { docs:{}, cols:{personnel:[],forms:[],news:[],tabs:[],items:[],linkitems:[]}, n:0 },

  async getDoc(path){
    if(this.mode==='firestore'){ const s=await db.doc(path).get(); return s.exists?s.data():null; }
    return this.mem.docs[path] ? {...this.mem.docs[path]} : null;
  },
  async setDoc(path,data){
    if(this.mode==='firestore'){ await db.doc(path).set(data,{merge:true}); return; }
    this.mem.docs[path] = {...(this.mem.docs[path]||{}),...data};
  },
  async listCol(name){
    if(this.mode==='firestore'){ const s=await db.collection(name).get(); return s.docs.map(d=>({id:d.id,...d.data()})); }
    return (this.mem.cols[name]||[]).map(x=>({...x}));
  },
  async addCol(name,data){
    if(this.mode==='firestore'){ const r=await db.collection(name).add(data); return r.id; }
    const id='m'+(++this.mem.n); (this.mem.cols[name]=this.mem.cols[name]||[]).push({id,...data}); return id;
  },
  async setColDoc(name,id,data){
    if(this.mode==='firestore'){ await db.collection(name).doc(id).set(data,{merge:true}); return; }
    const a=this.mem.cols[name]=this.mem.cols[name]||[]; const i=a.findIndex(x=>x.id===id);
    if(i>=0)a[i]={...a[i],...data}; else a.push({id,...data});
  },
  async updateCol(name,id,data){
    if(this.mode==='firestore'){ await db.collection(name).doc(id).update(data); return; }
    const a=this.mem.cols[name]||[]; const i=a.findIndex(x=>x.id===id); if(i>=0)a[i]={...a[i],...data};
  },
  async removeCol(name,id){
    if(this.mode==='firestore'){ await db.collection(name).doc(id).delete(); return; }
    this.mem.cols[name]=(this.mem.cols[name]||[]).filter(x=>x.id!==id);
  }
};

/* ============================================================
   สถานะรวมของแอป
   ============================================================ */
let SITE = {};       // ข้อมูลธีม/ชื่อ จาก content... จริงๆเก็บที่ config/site
let TABS = [];        // รายการแท็บ
let activeTab = null; // แท็บที่กำลังดู
let editing = false;  // อยู่ในโหมดผู้ดูแลหรือไม่

const $ = s => document.querySelector(s);

/* ---------- ค่าเริ่มต้น + seed ครั้งแรก ---------- */
async function loadSite(){
  SITE = await Store.getDoc('config/site') || {};
  // ค่าตั้งต้นถ้ายังว่าง
  SITE.name    = SITE.name    || 'กลุ่มบริหารวิชาการ';
  SITE.school  = SITE.school  || 'โรงเรียนของเรา';
  SITE.tagline = SITE.tagline || 'ร่วมพัฒนาคุณภาพการศึกษา';
  SITE.logo    = SITE.logo    || '';
  SITE.cover   = SITE.cover   || '';   // รูปหน้าปก (พื้นหลังหน้า Landing)
  SITE.header  = SITE.header  || '';   // รูป Header แบนเนอร์ (เหนือแท็บ ทุกหน้า)
  SITE.headerBright = (SITE.headerBright==null?100:SITE.headerBright); // ความสว่าง banner (%)
  SITE.announceOn   = !!SITE.announceOn;          // เปิด-ปิดประกาศสำคัญ
  SITE.announceText = SITE.announceText || '';    // ข้อความประกาศสำคัญ
  SITE.primary = SITE.primary || '#1f4d3a';
  SITE.accent  = SITE.accent  || '#c19a3e';
  SITE.font    = SITE.font    || 'Mitr';
  SITE.anim    = (SITE.anim===undefined) ? true : SITE.anim;
  SITE.pin     = SITE.pin     || ADMIN_PIN_DEFAULT;

// ทำสีให้เข้มขึ้น/อ่อนลงเล็กน้อย
function shade(hex,p){
  try{const n=parseInt(hex.slice(1),16);let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=Math.min(255,Math.round(r+(255-r)*p/100));g=Math.min(255,Math.round(g+(255-g)*p/100));b=Math.min(255,Math.round(b+(255-b)*p/100));
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);}catch(e){return hex;}
}

// ===== ลากจัดลำดับ (ใช้ได้ทั้งแท็บแนวนอน และบล็อกแนวตั้ง) =====
function enableDragSort(container,itemSel,axis,onReorder){
  let drag=null;
  const list=()=>[...container.querySelectorAll(itemSel)];
  list().forEach(el=>{
    el.setAttribute('draggable','true');
    el.addEventListener('dragstart',e=>{ drag=el; el.classList.add('dragging');
      e.dataTransfer.effectAllowed='move'; try{e.dataTransfer.setData('text/plain','');}catch(_){}; });
    el.addEventListener('dragend',()=>{ if(!drag)return; drag.classList.remove('dragging'); drag=null;
      const ids=list().map(x=>x.dataset.id).filter(Boolean); onReorder(ids); });
  });
  container.addEventListener('dragover',e=>{
    if(!drag) return; e.preventDefault();
    const after=dragAfter(container,itemSel,axis,e.clientX,e.clientY);
    const addBtn=container.querySelector('.addtab');
    if(after==null){ if(addBtn) container.insertBefore(drag,addBtn); else container.appendChild(drag); }
    else container.insertBefore(drag,after);
  });
}
function dragAfter(container,itemSel,axis,x,y){
  const els=[...container.querySelectorAll(itemSel+':not(.dragging)')];
  let best={offset:-Infinity,el:null};
  els.forEach(el=>{ const r=el.getBoundingClientRect();
    const off = axis==='x' ? (x-r.left-r.width/2) : (y-r.top-r.height/2);
    if(off<0 && off>best.offset) best={offset:off,el}; });
  return best.el;
}
async function reorderTabs(ids){
  for(let i=0;i<ids.length;i++){ const t=TABS.find(x=>x.id===ids[i]);
    if(t && t.order!==i){ t.order=i; await Store.updateCol('tabs',t.id,{order:i}); } }
  TABS.sort((a,b)=>(a.order||0)-(b.order||0));
  renderTabs();
}
async function reorderBlocks(col,ids){
  for(let i=0;i<ids.length;i++){ await Store.updateCol(col,ids[i],{order:i}); }
  renderMain();
}
// เลื่อนบล็อกขึ้น/ลงทีละตำแหน่ง (ง่ายกว่าการลาก)
function moveBlock(col,ids,id,dir){
  const i=ids.indexOf(id); if(i<0) return;
  const j=i+dir; if(j<0||j>=ids.length) return;
  const t=ids[i]; ids[i]=ids[j]; ids[j]=t;
  reorderBlocks(col,ids);
}

// แยกชนิดไฟล์จากชื่อ/ประเภท เพื่อเลือกไอคอนและสี
function fileKind(name,type){
  const s=((name||'')+' '+(type||'')).toLowerCase();
  // ตรวจตามนามสกุล/คำเฉพาะที่ "ไม่ชนกัน" ก่อน
  // หมายเหตุ: mime ของ Office (xlsx/pptx/docx) ล้วนมีคำว่า "officedocument" จึงห้ามใช้คำว่า document มาตัดสิน
  if(/\.pdf\b|\/pdf/.test(s))                                  return {cls:'pdf', ic:'📕', label:'PDF'};
  if(/\.xlsx?\b|\.csv\b|excel|spreadsheet/.test(s))           return {cls:'xls', ic:'📗', label:'Excel'};
  if(/\.pptx?\b|powerpoint|presentation/.test(s))             return {cls:'ppt', ic:'📙', label:'PowerPoint'};
  if(/\.docx?\b|msword|wordprocessing|word/.test(s))          return {cls:'doc', ic:'📘', label:'Word'};
  return {cls:'other', ic:'📄', label:'ไฟล์'};
}
// แปลงขนาดไฟล์ให้อ่านง่าย
function fileSize(b){ if(!b) return ''; const u=['B','KB','MB','GB']; let i=0,n=b;
  while(n>=1024&&i<u.length-1){n/=1024;i++;} return n.toFixed(n<10&&i>0?1:0)+' '+u[i]; }

const HOME_TYPES=['text','textbox','marquee','image','album','cards','buttons','embed'];
const GALLERY_TYPES=['image','album','cardlink'];
const TB_EFFECTS=[['info','ข้อมูล (ฟ้า)'],['success','สำเร็จ (เขียว)'],['warning','คำเตือน (เหลือง)'],
  ['danger','สำคัญ (แดง)'],['highlight','ไฮไลต์ (ไล่สี)'],['outline','เส้นขอบประ'],['glow','เรืองแสง'],['soft','เงานุ่ม']];

let EDIT_PHOTOS=[], EDIT_CARDS=[], EDIT_BUTTONS=[], LB_SETS={}, LB_CUR=null;

/* ---------- หน้าหลัก: หลายบล็อก ---------- */
async function renderHome(m){
  const blocks=(await Store.listCol('homeblocks')).sort((a,b)=>(a.order||0)-(b.order||0));
  const legacy=await Store.getDoc('content/home');
  LB_SETS={};
  let html=`<div class="hero"><h2>${esc(SITE.name)}</h2><p>${esc(SITE.tagline)}</p></div>`;
  html+=`<div class="section-head"><h2>${esc(activeTab.title)}</h2></div>`;
  if(blocks.length===0 && (!legacy||!legacy.html) && !editing) html+=`<div class="empty">ยังไม่มีเนื้อหา</div>`;
  html+=`<div class="blocks">`;
  // เนื้อหาข้อความเดิม (ถ้ายังไม่มีบล็อกใหม่) — แสดงไว้ไม่ให้ข้อมูลหาย
  if(legacy && legacy.html && blocks.length===0){
    html+=`<div class="block-wrap"><div class="block-text">${esc(legacy.html)}</div>
      ${editing?`<div class="bw-tools"><button class="mini" id="editLegacy">แก้ไขข้อความเดิม</button></div>`:''}</div>`;
  }
  blocks.forEach((b,idx)=>{ html+=`<div class="block-wrap size-${b.size||'full'}" data-id="${b.id}">${homeBlockHtml(b)}${editing?blockToolsHtml(b,idx,blocks.length):''}</div>`; });
  html+=`</div>`;
  if(editing) html+=`<div style="margin-top:18px"><button class="add-pill" id="addBlock">+ เพิ่มบล็อกเนื้อหา</button></div>`;
  m.innerHTML=html;
  bindLb(m); initCarousels(m); bindEmbeds(m);
  if(editing){
    const el=$('#editLegacy'); if(el) el.onclick=()=>editContentBlock('content/home',(legacy&&legacy.html)||'');
    $('#addBlock').onclick=()=>blockForm('homeblocks',null,HOME_TYPES);
    m.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>blockForm('homeblocks',blocks.find(x=>x.id===b.dataset.edit),HOME_TYPES));
    m.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>confirmDel('homeblocks',b.dataset.del));
    const ids=blocks.map(x=>x.id);
    m.querySelectorAll('[data-up]').forEach(b=>b.onclick=()=>moveBlock('homeblocks',ids.slice(),b.dataset.up,-1));
    m.querySelectorAll('[data-down]').forEach(b=>b.onclick=()=>moveBlock('homeblocks',ids.slice(),b.dataset.down,1));
    const blocksBox=m.querySelector('.blocks');
    if(blocksBox && blocks.length>1) enableDragSort(blocksBox,'.block-wrap[data-id]','y',ids2=>reorderBlocks('homeblocks',ids2));
  }
}
function blockToolsHtml(b,idx,total){
  const up = idx>0       ? `<button class="mini" data-up="${b.id}" title="เลื่อนขึ้น">▲</button>`   : `<button class="mini" disabled>▲</button>`;
  const dn = idx<total-1 ? `<button class="mini" data-down="${b.id}" title="เลื่อนลง">▼</button>` : `<button class="mini" disabled>▼</button>`;
  return `<div class="bw-tools">${up}${dn}
    <button class="mini" data-edit="${b.id}">แก้ไข</button>
    <button class="mini del" data-del="${b.id}">ลบ</button></div>`;
}
function homeBlockHtml(b){
  const H=b.heading?`<div class="block-heading">${esc(b.heading)}</div>`:'';
  if(b.type==='text') return `${H}<div class="block-text">${esc(b.body||'')}</div>`;
  if(b.type==='textbox'){
    const eff=b.effect||'info';
    return `<div class="textbox tb-${eff}">${b.label?`<span class="tb-label">${esc(b.label)}</span>`:''}<div class="tb-body">${esc(b.body||'')}</div></div>`;
  }
  if(b.type==='marquee'){
    const sp={slow:38,normal:24,fast:13}[b.speed||'normal'];
    const dir=(b.dir==='right')?'reverse':'normal';
    const txt=esc(b.text||'');
    return `${H}<div class="marquee"><span class="mq-track" style="animation-duration:${sp}s;animation-direction:${dir}">${txt}&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;${txt}&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></div>`;
  }
  if(b.type==='image'){
    LB_SETS[b.id]=[{url:b.photo||'',cap:b.caption||''}];
    const link=b.link?normUrl(b.link):'';
    const imgInner=`<div data-lb="${b.id}" data-i="0">${b.photo?imgTag(b.photo):''}</div>`;
    const body=link?`<a href="${link}" target="_blank" rel="noopener">${b.photo?imgTag(b.photo):''}</a>`:imgInner;
    return `${H}<div class="single-img">${body}${b.caption?`<div class="img-cap">${esc(b.caption)}</div>`:''}</div>`;
  }
  if(b.type==='album'){
    const photos=(b.photos||[]).filter(Boolean);
    LB_SETS[b.id]=photos.map(u=>({url:u,cap:b.heading||''}));
    return `${H}${carouselHtml(b.id,photos)}`;
  }
  if(b.type==='cards'){
    let g=`<div class="grid">`;
    (b.cards||[]).forEach(c=>{
      const link=c.link?normUrl(c.link):'';
      const inner=`<div class="photo">${c.photo?imgTag(c.photo):''}</div>
        <div class="body"><div class="t">${esc(c.title||'')}</div>${c.desc?`<div class="d">${esc(c.desc)}</div>`:''}</div>`;
      g+= link?`<a class="card clickable" href="${link}" target="_blank" rel="noopener">${inner}</a>`:`<div class="card">${inner}</div>`;
    });
    g+=`</div>`;
    return `${H}${g}`;
  }
  if(b.type==='buttons'){
    let r=`<div class="btnrow">`;
    (b.buttons||[]).forEach(bt=>{ const link=bt.link?normUrl(bt.link):'#'; r+=`<a class="bigbtn" href="${link}" target="_blank" rel="noopener">${esc(bt.label||'ลิงก์')}</a>`; });
    r+=`</div>`;
    return `${H}${r}`;
  }
  if(b.type==='embed') return `${H}<div class="block-embed">${embedHtml(b.embed)}</div>`;
  return H;
}

/* ---------- ภาพกิจกรรม (gallery) ---------- */
async function renderGallery(m){
  const col=TAB_KINDS[activeTab.type].store.col;
  let items=await Store.listCol(col);
  if(TAB_KINDS[activeTab.type].store.filterTab) items=items.filter(i=>i.tabId===activeTab.id);
  items.sort((a,b)=>(a.order||0)-(b.order||0));
  LB_SETS={};
  let html=`<div class="section-head"><h2>${esc(activeTab.title)}</h2></div>`;
  if(items.length===0 && !editing) html+=`<div class="empty">ยังไม่มีภาพกิจกรรม</div>`;
  html+=`<div class="gallery-grid">`;
  items.forEach(it=>{ html+=galleryTileHtml(it,editing); });
  html+=`</div>`;
  if(editing) html+=`<div style="margin-top:18px"><button class="add-pill" id="addGal">+ เพิ่มภาพกิจกรรม</button></div>`;
  m.innerHTML=html;
  bindLb(m);
  if(editing){
    $('#addGal').onclick=()=>blockForm(col,null,GALLERY_TYPES);
    m.querySelectorAll('[data-edit]').forEach(b=>b.onclick=(e)=>{e.stopPropagation();blockForm(col,items.find(x=>x.id===b.dataset.edit),GALLERY_TYPES);});
    m.querySelectorAll('[data-del]').forEach(b=>b.onclick=(e)=>{e.stopPropagation();confirmDel(col,b.dataset.del);});
  }
}
function galleryTileHtml(it,ed){
  const tools= ed?`<div class="tools"><button class="mini" data-edit="${it.id}">แก้</button>
    <button class="mini del" data-del="${it.id}">ลบ</button></div>`:'';
  if(it.type==='cardlink'){
    const link=(!ed&&it.link)?normUrl(it.link):'';
    const inner=`${it.photo?imgTag(it.photo):''}${it.title?`<div class="cap">${esc(it.title)}</div>`:''}${tools}`;
    return link?`<a class="gtile" href="${link}" target="_blank" rel="noopener">${inner}</a>`:`<div class="gtile">${inner}</div>`;
  }
  if(it.type==='album'){
    const photos=(it.photos||[]).filter(Boolean);
    LB_SETS[it.id]=photos.map(u=>({url:u,cap:it.title||''}));
    return `<div class="gtile" ${ed?'':`data-lb="${it.id}" data-i="0"`}>
      ${photos[0]?imgTag(photos[0]):''}
      <div class="count">🖼 ${photos.length}</div>
      ${it.title?`<div class="cap">${esc(it.title)}</div>`:''}${tools}</div>`;
  }
  // image (รูปเดียว)
  LB_SETS[it.id]=[{url:it.photo||'',cap:it.caption||''}];
  return `<div class="gtile" ${ed?'':`data-lb="${it.id}" data-i="0"`}>
    ${it.photo?imgTag(it.photo):''}
    ${it.caption?`<div class="cap">${esc(it.caption)}</div>`:''}${tools}</div>`;
}

/* ---------- Image Carousel ---------- */
function carouselHtml(id,photos){
  if(!photos.length) return '';
  const slides=photos.map((u,i)=>`<div class="car-slide" data-lb="${id}" data-i="${i}">${imgTag(u)}</div>`).join('');
  if(photos.length===1) return `<div class="carousel" data-cid="${id}"><div class="car-track">${slides}</div></div>`;
  const dots=photos.map((_,i)=>`<b data-i="${i}" class="${i===0?'on':''}"></b>`).join('');
  return `<div class="carousel" data-cid="${id}">
    <div class="car-track">${slides}</div>
    <button class="car-nav prev" data-d="-1">‹</button>
    <button class="car-nav next" data-d="1">›</button>
    <div class="car-counter"><span class="cc-now">1</span>/${photos.length}</div>
    <div class="car-dots">${dots}</div>
  </div>`;
}
function initCarousels(scope){
  scope.querySelectorAll('.carousel').forEach(car=>{
    const track=car.querySelector('.car-track');
    const slides=car.querySelectorAll('.car-slide');
    const n=slides.length; if(n<=1) return;
    let i=0, timer=null;
    const dots=car.querySelectorAll('.car-dots b');
    const ccnow=car.querySelector('.cc-now');
    const go=(k)=>{ i=(k+n)%n; track.style.transform=`translateX(${-i*100}%)`;
      dots.forEach((d,j)=>d.classList.toggle('on',j===i)); if(ccnow) ccnow.textContent=i+1; };
    const start=()=>{ stop(); timer=setInterval(()=>go(i+1),4500); };
    const stop =()=>{ if(timer){ clearInterval(timer); timer=null; } };
    car.querySelectorAll('.car-nav').forEach(b=>b.onclick=(e)=>{ e.stopPropagation(); go(i+parseInt(b.dataset.d,10)); start(); });
    dots.forEach(d=>d.onclick=(e)=>{ e.stopPropagation(); go(parseInt(d.dataset.i,10)); start(); });
    car.onmouseenter=stop; car.onmouseleave=start;
    let sx=null;
    car.addEventListener('touchstart',e=>{ sx=e.touches[0].clientX; stop(); },{passive:true});
    car.addEventListener('touchend',e=>{ if(sx==null) return; const dx=e.changedTouches[0].clientX-sx;
      if(Math.abs(dx)>40) go(i+(dx<0?1:-1)); sx=null; start(); },{passive:true});
    start();
  });
}

/* ---------- lightbox ---------- */
function bindLb(scope){
  scope.querySelectorAll('[data-lb]').forEach(el=>{
    el.style.cursor='zoom-in';
    el.onclick=()=>openLightbox(el.dataset.lb, parseInt(el.dataset.i||'0',10));
  });
}
function openLightbox(key,i){
  const set=LB_SETS[key]; if(!set||!set.length) return;
  LB_CUR={set, i:Math.max(0,Math.min(i||0,set.length-1))};
  showLb(); $('#lightbox').classList.add('show');
}
function showLb(){
  if(!LB_CUR) return; const {set,i}=LB_CUR; const p=set[i]||{};
  $('#lbImg').src=normImg(p.url||''); $('#lbCap').textContent=p.cap||'';
  $('#lbCount').textContent=set.length>1?`${i+1} / ${set.length}`:'';
  $('#lbPrev').style.display=$('#lbNext').style.display=set.length>1?'grid':'none';
}
function lbStep(d){ if(!LB_CUR) return; const n=LB_CUR.set.length; LB_CUR.i=(LB_CUR.i+d+n)%n; showLb(); }
function closeLightbox(){ $('#lightbox').classList.remove('show'); LB_CUR=null; }
$('#lbClose').onclick=closeLightbox;
$('#lbPrev').onclick=()=>lbStep(-1);
$('#lbNext').onclick=()=>lbStep(1);
$('#lightbox').onclick=(e)=>{ if(e.target.id==='lightbox') closeLightbox(); };
document.addEventListener('keydown',e=>{
  if(!$('#lightbox').classList.contains('show')) return;
  if(e.key==='Escape') closeLightbox();
  else if(e.key==='ArrowLeft') lbStep(-1);
  else if(e.key==='ArrowRight') lbStep(1);
});

/* ---------- ฟอร์มบล็อก (ใช้ร่วมหน้าหลัก + ภาพกิจกรรม) ---------- */
function blockForm(col,item,types){
  const it=item||{};
  const curType=(it.type&&types.includes(it.type))?it.type:types[0];
  EDIT_PHOTOS=(it.photos||[]).slice();
  EDIT_CARDS=(it.cards||[]).map(c=>({...c}));
  EDIT_BUTTONS=(it.buttons||[]).map(c=>({...c}));
  const typeSel=`<select id="blk_type">${types.map(t=>`<option value="${t}" ${t===curType?'selected':''}>${TYPE_LABELS[t]}</option>`).join('')}</select>`;
  const isHome=(col==='homeblocks');
  const sizeOpts=[['full','เต็มความกว้าง'],['lg','ใหญ่'],['md','กลาง'],['sm','เล็ก']];
  const curSize=it.size||'full';
  const sizeSel=isHome?field('ขนาดแสดงผลของบล็อก',`<select id="blk_size">${sizeOpts.map(o=>`<option value="${o[0]}" ${o[0]===curSize?'selected':''}>${o[1]}</option>`).join('')}</select>`,'กำหนดความกว้างของบล็อกบนหน้า'):'';
  openModal(item?'แก้ไขบล็อก':'เพิ่มบล็อก',
    field('ชนิดบล็อก',typeSel)+sizeSel+`<div id="blkFields"></div>`,
    `<button class="btn ghost" onclick="closeModal()">ยกเลิก</button>
     <button class="btn primary" id="saveBlk">บันทึก</button>`);
  const draw=()=>renderBlockFields($('#blk_type').value,it);
  $('#blk_type').onchange=draw; draw();
  $('#saveBlk').onclick=async()=>{
    const t=$('#blk_type').value;
    const data={type:t, order:it.order||Date.now()};
    const sz=$('#blk_size'); if(sz) data.size=sz.value;
    if(col!=='homeblocks') data.tabId=activeTab.id;   // ภาพกิจกรรมต้องผูกกับแท็บ
    const hv=$('#blk_heading'); if(hv) data.heading=hv.value.trim();
    if(t==='text'){ data.body=$('#blk_body').value; }
    else if(t==='textbox'){ data.label=$('#blk_label').value.trim(); data.effect=$('#blk_effect').value; data.body=$('#blk_body').value; }
    else if(t==='marquee'){ data.text=$('#blk_text').value.trim(); data.speed=$('#blk_speed').value; data.dir=$('#blk_dir').value; }
    else if(t==='image'){ data.photo=$('#blk_photo').value.trim(); data.caption=$('#blk_caption').value.trim(); if($('#blk_link')) data.link=$('#blk_link').value.trim(); }
    else if(t==='album'){ data.photos=EDIT_PHOTOS.filter(Boolean); }
    else if(t==='cardlink'){ data.photo=$('#blk_photo').value.trim(); data.title=$('#blk_title').value.trim(); data.desc=$('#blk_desc').value.trim(); data.link=$('#blk_link').value.trim(); }
    else if(t==='cards'){ data.cards=EDIT_CARDS.filter(c=>c.title||c.photo||c.link); }
    else if(t==='buttons'){ data.buttons=EDIT_BUTTONS.filter(b=>b.label||b.link); }
    else if(t==='embed'){ data.embed=$('#blk_embed').value.trim(); }
    await saveItem(col,item,data); closeModal(); renderMain(); toast('บันทึกแล้ว');
  };
}
function renderBlockFields(type,it){
  const box=$('#blkFields'); let h='';
  const heading=(label)=>field(label||'หัวข้อ (ไม่บังคับ)',`<input type="text" id="blk_heading" value="${attr(it.heading)}">`);
  if(type==='text'){
    h=heading()+field('เนื้อหา',`<textarea id="blk_body" style="min-height:160px">${esc(it.body||'')}</textarea>`,'เว้นบรรทัดได้ตามปกติ');
  }else if(type==='textbox'){
    h=field('ป้ายกำกับ (Label, ไม่บังคับ)',`<input type="text" id="blk_label" value="${attr(it.label)}" placeholder="เช่น ประกาศ, สำคัญ, หมายเหตุ">`)
     +field('สไตล์/เอฟเฟค',`<select id="blk_effect">${TB_EFFECTS.map(o=>`<option value="${o[0]}" ${o[0]===(it.effect||'info')?'selected':''}>${o[1]}</option>`).join('')}</select>`)
     +field('ข้อความ',`<textarea id="blk_body" style="min-height:120px">${esc(it.body||'')}</textarea>`,'เว้นบรรทัดได้');
  }else if(type==='marquee'){
    h=field('ข้อความวิ่ง',`<input type="text" id="blk_text" value="${attr(it.text)}" placeholder="ข้อความที่จะเลื่อนวิ่ง">`)
     +field('ความเร็ว',`<select id="blk_speed">${[['slow','ช้า'],['normal','ปกติ'],['fast','เร็ว']].map(o=>`<option value="${o[0]}" ${o[0]===(it.speed||'normal')?'selected':''}>${o[1]}</option>`).join('')}</select>`)
     +field('ทิศทาง',`<select id="blk_dir"><option value="left" ${it.dir!=='right'?'selected':''}>วิ่งไปทางซ้าย</option><option value="right" ${it.dir==='right'?'selected':''}>วิ่งไปทางขวา</option></select>`);
  }else if(type==='image'){
    h=imgField('blk_photo',it.photo,'รูปภาพ')
     +field('คำบรรยายใต้รูป (ไม่บังคับ)',`<input type="text" id="blk_caption" value="${attr(it.caption)}">`)
     +field('ลิงก์เมื่อกดรูป (ไม่บังคับ)',`<input type="url" id="blk_link" value="${attr(it.link)}" placeholder="https://...">`,'ถ้าใส่ลิงก์ การกดรูปจะเปิดลิงก์แทนการซูม');
  }else if(type==='album'){
    h=heading('ชื่ออัลบั้ม (ไม่บังคับ)')
     +`<div class="field"><label>รูปในอัลบั้ม</label><div class="editor-list" id="photoEditor"></div>
        <div class="uprow"><input type="file" id="ph_file" accept="image/*" multiple></div>
        <input type="url" id="ph_url" placeholder="หรือวางลิงก์รูป แล้วกดปุ่มเพิ่ม" style="margin-top:8px">
        <button type="button" class="add-mini" id="ph_add">+ เพิ่มลิงก์รูป</button>
        <div class="hint">อัปโหลดได้หลายรูปพร้อมกัน (เลือกหลายไฟล์) หรือวางลิงก์ทีละรูป • กด ↑ เพื่อสลับลำดับ</div></div>`;
  }else if(type==='cardlink'){
    h=imgField('blk_photo',it.photo,'รูปการ์ด')
     +field('หัวข้อการ์ด',`<input type="text" id="blk_title" value="${attr(it.title)}">`)
     +field('คำอธิบาย (ไม่บังคับ)',`<input type="text" id="blk_desc" value="${attr(it.desc)}">`)
     +field('ลิงก์ปลายทาง',`<input type="url" id="blk_link" value="${attr(it.link)}" placeholder="https://...">`,'กดที่การ์ดเพื่อเปิดลิงก์นี้');
  }else if(type==='cards'){
    h=heading()+`<div class="field"><label>การ์ดในกลุ่ม</label><div class="editor-list" id="cardsEditor"></div>
      <button type="button" class="add-mini" id="cards_add">+ เพิ่มการ์ด</button></div>`;
  }else if(type==='buttons'){
    h=heading()+`<div class="field"><label>ปุ่มลิงก์</label><div class="editor-list" id="buttonsEditor"></div>
      <button type="button" class="add-mini" id="btn_add">+ เพิ่มปุ่ม</button></div>`;
  }else if(type==='embed'){
    h=heading()+field('ลิงก์/โค้ดฝัง',`<input type="url" id="blk_embed" value="${attr(it.embed)}" placeholder="วาง URL หรือโค้ด <iframe>">`,'รองรับ YouTube, Google Form (เติม embedded ให้เอง), Google Maps ฯลฯ');
  }
  box.innerHTML=h;
  if(type==='image'||type==='cardlink') bindUpload('blk_photo');
  if(type==='album'){ renderPhotoEditor(); bindAlbumControls(); }
  if(type==='cards'){ renderCardsEditor(); $('#cards_add').onclick=()=>{EDIT_CARDS.push({photo:'',title:'',desc:'',link:''});renderCardsEditor();}; }
  if(type==='buttons'){ renderButtonsEditor(); $('#btn_add').onclick=()=>{EDIT_BUTTONS.push({label:'',link:''});renderButtonsEditor();}; }
}
/* ตัวแก้ไขหลายรูป (อัลบั้ม) */
function bindAlbumControls(){
  const f=$('#ph_file');
  if(f) f.onchange=async()=>{
    const files=[...f.files]; if(!files.length) return;
    showUploading('กำลังอัปโหลดรูป…');           // ค้าง overlay ไว้ตลอดทั้งชุด (refcount)
    let ok=0;
    for(let k=0;k<files.length;k++){
      const url=await uploadImage(files[k], `กำลังอัปโหลดรูปที่ ${k+1}/${files.length}…`);
      if(url){ EDIT_PHOTOS.push(url); renderPhotoEditor(); ok++; }
    }
    hideUploading();
    f.value=''; toast('อัปโหลดรูปเสร็จ '+ok+'/'+files.length);
  };
  const add=$('#ph_add');

function renderPhotoEditor(){
  const box=$('#photoEditor'); if(!box) return; box.innerHTML='';

function openModal(title,bodyHTML,footHTML){

}
function closeModal(){ $('#overlay').classList.remove('show'); }

function field(label,inner,hint){return `<div class="field"><label>${label}</label>${inner}${hint?`<div class="hint">${hint}</div>`:''}</div>`;}
function imgField(id,val,label){
  return `<div class="field"><label>${label||'รูปภาพ'}</label>
    <div class="uprow">
      <input type="file" id="${id}_file" accept="image/*">
      <img class="thumb" id="${id}_thumb" referrerpolicy="no-referrer" ${val?`src="${normImg(val)}" style="display:block"`:''}>

    if(url){ $('#'+id).value=url; const t=$('#'+id+'_thumb'); t.src=normImg(url); t.style.display='block'; toast('อัปโหลดสำเร็จ'); }

function bindDocUpload(){

    const st=$('#fl_state'); if(st) st.textContent='⏳ กำลังอัปโหลดไฟล์… (อาจใช้เวลาสองสามวินาที)';

      $('#fl_type').value=r.type; $('#fl_size').value=r.size;
      const k=fileKind(r.name,r.type);
      if(st) st.textContent=`✅ อัปโหลดแล้ว: ${r.name} (${k.label}, ${fileSize(r.size)})`;

      if(!$('#fl_title').value.trim()) $('#fl_title').value=r.name.replace(/\.[^.]+$/,'');

    }else if(st){ st.textContent='❌ อัปโหลดไม่สำเร็จ ลองใหม่อีกครั้ง'; }
  };

function sesGet(k){ try{ return sessionStorage.getItem(k); }catch(e){ return window.__ses&&window.__ses[k]; } }
function sesSet(k,v){ try{ sessionStorage.setItem(k,v); }catch(e){ (window.__ses=window.__ses||{})[k]=v; } }

$('#gearBtn').onclick=()=>{
  if(editing){ exitEditing(); return; }
  if(sesGet('adminAuthed')==='1'){ enterEditing(); return; }   // ยืนยันแล้วใน session นี้ → เข้าได้เลย
  openModal('เข้าสู่โหมดผู้ดูแล',
    field('กรอก PIN',`<input type="password" id="pinInput" placeholder="••••" autocomplete="off">`,

    `<button class="btn ghost" onclick="closeModal()">ยกเลิก</button>
     <button class="btn primary" id="pinOk">เข้าสู่ระบบ</button>`);
  $('#pinInput').addEventListener('keydown',e=>{if(e.key==='Enter')$('#pinOk').click();});
  setTimeout(()=>$('#pinInput').focus(),50);
  $('#pinOk').onclick=()=>{
    if($('#pinInput').value===String(SITE.pin)){ sesSet('adminAuthed','1'); closeModal(); enterEditing(); }
    else toast('PIN ไม่ถูกต้อง');
  };
};

/* ---------- ปุ่ม QR code / แชร์ลิงก์ ---------- */
function loadQRLib(cb){
  if(window.QRCode){ cb(); return; }
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
  s.onload=()=>cb(); s.onerror=()=>cb(true);
  document.head.appendChild(s);
}
$('#qrBtn').onclick=()=>{
  const url=location.href.split('#')[0];
  openModal('QR code / แชร์ลิงก์เว็บ',
    `<div class="qr-wrap">
       <div class="qr-canvas" id="qrCanvas">กำลังสร้าง QR…</div>
       <div class="qr-url" id="qrUrl">${esc(url)}</div>
       <div class="qr-acts">
         <button class="btn ghost" id="qrCopy">📋 คัดลอกลิงก์</button>
         <button class="btn primary" id="qrDl">⬇ ดาวน์โหลด QR</button>
       </div>
     </div>`,
    `<button class="btn ghost" onclick="closeModal()">ปิด</button>`);
  $('#qrCopy').onclick=async()=>{
    try{ await navigator.clipboard.writeText(url); toast('คัดลอกลิงก์แล้ว'); }
    catch(e){ const t=document.createElement('textarea'); t.value=url; document.body.appendChild(t); t.select();
      try{document.execCommand('copy'); toast('คัดลอกลิงก์แล้ว');}catch(_){toast('คัดลอกไม่สำเร็จ');} t.remove(); }
  };
  const box=$('#qrCanvas');
  loadQRLib((failed)=>{
    box.innerHTML='';
    if(!failed && window.QRCode){
      new QRCode(box,{text:url,width:230,height:230,colorDark:'#1f4d3a',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
      $('#qrDl').onclick=()=>{
        const c=box.querySelector('canvas');
        const src=c?c.toDataURL('image/png'):(box.querySelector('img')||{}).src;
        if(src){ const a=document.createElement('a'); a.href=src; a.download='qrcode.png'; a.click(); }
      };
    }else{
      // สำรอง: ใช้บริการสร้าง QR ออนไลน์
      const api='https://api.qrserver.com/v1/create-qr-code/?size=230x230&data='+encodeURIComponent(url);
      box.innerHTML=`<img src="${api}" width="230" height="230" alt="QR">`;
      $('#qrDl').onclick=()=>{ const a=document.createElement('a'); a.href=api; a.download='qrcode.png'; a.target='_blank'; a.click(); };
    }
  });
};

function loadFont(name){
  const id='f_'+name.replace(/\s/g,'');
  if(document.getElementById(id))return;
  const l=document.createElement('link'); l.id=id; l.rel='stylesheet';
  l.href='https://fonts.googleapis.com/css2?family='+name.replace(/\s/g,'+')+':wght@400;500;600&display=swap';
  document.head.appendChild(l);
}

/* ============================================================
   อัปโหลดรูปผ่าน Apps Script -> Google Drive
   (ใช้ Content-Type text/plain เพื่อเลี่ยง CORS preflight)
   ============================================================ */
function toBase64(file){return new Promise((res,rej)=>{const r=new FileReader();
  r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});}

// ★ overlay แอนิเมชัน "กำลังอัปโหลด" (นับซ้อนได้ ไม่กระพริบตอนอัปโหลดหลายไฟล์)
let UP_COUNT=0;
function showUploading(text){ UP_COUNT++; if(text)$('#upText').textContent=text; $('#upOverlay').classList.add('show'); }
function setUploading(text){ if(text)$('#upText').textContent=text; }
function hideUploading(){ UP_COUNT=Math.max(0,UP_COUNT-1); if(UP_COUNT===0)$('#upOverlay').classList.remove('show'); }

// ★ แกนกลางการอัปโหลด (ใช้ทั้งรูปและไฟล์เอกสาร)
//   1) POST ขึ้น GAS แบบ mode:'no-cors' (ส่งได้ชัวร์ ไม่ติด CORS แต่ "อ่าน response ไม่ได้")
//   2) GAS อัปโหลดไฟล์ + จดลิงก์ไว้ใน CacheService โดยอ้างด้วย key
//   3) frontend วน GET ดึงลิงก์กลับด้วย key เดิม (GET ข้าม origin อ่านได้ปกติ)
//   คืนค่า object {id?, url?} หรือ null
async function gasUploadRaw(file, folderId, label){
  if(!SITE.gasUploadUrl){ toast('ยังไม่ตั้งค่าการอัปโหลด (Apps Script URL)'); return null; }
  if(!folderId){ toast('ยังไม่ตั้งค่าโฟลเดอร์ Drive'); return null; }
  showUploading(label||'กำลังอัปโหลด…');
  try{
    const data=await toBase64(file);
    const key=(window.crypto&&crypto.randomUUID)?crypto.randomUUID()
              :(Date.now().toString(36)+Math.random().toString(36).slice(2));
    // (1) ส่งไฟล์ — no-cors จึงไม่ต้องอ่าน response (กันปัญหา CORS ใน iframe Google Sites)
    try{
      await fetch(SITE.gasUploadUrl,{method:'POST',mode:'no-cors',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body:JSON.stringify({key,filename:file.name,mimeType:file.type,data,folderId})});
    }catch(e){ /* no-cors โดยปกติไม่ throw */ }
    // (2) วนอ่านลิงก์กลับจาก GAS ด้วย key (สูงสุด ~22 วินาที)
    for(let i=0;i<18;i++){
      await new Promise(r=>setTimeout(r,1200));
      try{
        const r=await fetch(SITE.gasUploadUrl+'?key='+encodeURIComponent(key)+'&t='+Date.now());
        const j=await r.json();
        if(j&&j.error){ console.error('GAS error:',j.error); toast('อัปโหลดล้มเหลว: '+j.error); return null; }
        if(j&&(j.url||j.id)) return j;
      }catch(e){ /* ยังไม่พร้อม ลองใหม่ */ }
    }
    return null;
  } finally { hideUploading(); }
}

// อัปโหลด "รูปภาพ" -> คืนลิงก์ thumbnail ที่เสถียร
async function uploadImage(file,label){
  const j=await gasUploadRaw(file, SITE.driveFolderId, label||'กำลังอัปโหลดรูป…');
  if(!j){ toast('อัปโหลดช้า/ล้มเหลว — ลองใหม่ หรือวางลิงก์รูปเอง'); return null; }
  const id=j.id||driveImgId(j.url||'');
  if(id) return 'https://drive.google.com/thumbnail?id='+id+'&sz=w1600';
  return j.url||null;
}

// อัปโหลด "ไฟล์เอกสาร" (PDF/Word/Excel) -> คืน {id, name, size, type}
// ใช้โฟลเดอร์เอกสารแยก (docFolderId) ถ้าเว้นว่างจะใช้โฟลเดอร์รูปแทน
async function uploadDoc(file){
  const folder=SITE.docFolderId||SITE.driveFolderId;
  const j=await gasUploadRaw(file, folder, 'กำลังอัปโหลดไฟล์…');
  if(!j){ toast('อัปโหลดไฟล์ช้า/ล้มเหลว — ลองใหม่อีกครั้ง'); return null; }
  const id=j.id||driveImgId(j.url||'');   // ดึง File ID จากลิงก์ที่ GAS ส่งกลับ (ไม่ต้องแก้ GAS)
  if(id) return {id, name:file.name, size:file.size||0, type:file.type||''};
  toast('อัปโหลดไฟล์ล้มเหลว'); return null;
}

/* ============================================================
   utilities
   ============================================================ */
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function attr(s){return esc(s).replace(/"/g,'&quot;');}
function formatDate(d){ if(!d)return''; try{return new Date(d).toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'});}catch(e){return d;} }
// แปลงลิงก์ Google Drive ทุกรูปแบบ -> endpoint thumbnail ที่แสดงใน <img> ได้จริง
// (ลิงก์ตรงทั่วไปที่ไม่ใช่ Drive จะคืนค่าตามเดิม)
// ★ ใช้ drive.google.com/thumbnail เป็นหลัก เพราะเสถียรสุด แสดงได้แม้ไฟล์เพิ่งอัปโหลด
function normImg(url){
  if(!url) return '';
  const id=driveImgId(url);
  if(id) return 'https://drive.google.com/thumbnail?id='+id+'&sz=w1600';
  return url;
}
// เติม https:// ให้ลิงก์ที่พิมพ์มาไม่ครบ
function normUrl(u){ if(!u) return ''; return /^https?:\/\//i.test(u)?u:'https://'+u; }
// ดึง FILE_ID จากลิงก์ Drive ทุกแบบ
function driveImgId(url){
  if(!url) return '';
  let m;
  if(m=url.match(/lh3\.googleusercontent\.com\/d\/([-\w]+)/)) return m[1];
  if(m=url.match(/\/file\/d\/([-\w]+)/)) return m[1];
  if(m=url.match(/thumbnail\?id=([-\w]+)/)) return m[1];
  if(m=url.match(/[?&]id=([-\w]+)/)) return m[1];
  if(m=url.match(/\/d\/([-\w]+)/)) return m[1];
  return '';
}
// ★ รายการลิงก์ที่จะลองโหลดตามลำดับความเสถียร (ยกวิธีจากระบบตัวอย่างที่ได้ผล)
//   1) drive thumbnail — แสดงได้จริงแม้ไฟล์เพิ่งอัปโหลด (เสถียรสุด)
//   2) lh3.googleusercontent — สำรองตัวที่ 1
//   3) uc?export=view — สำรองตัวที่ 2
//   4) ลิงก์เดิม — เผื่อเป็นลิงก์ตรงที่ไม่ใช่ Drive
function driveImgCandidates(url){
  const id=driveImgId(url);
  if(!id) return [url];
  return [
    'https://drive.google.com/thumbnail?id='+id+'&sz=w1600',
    'https://lh3.googleusercontent.com/d/'+id+'=w1600',
    'https://drive.google.com/uc?export=view&id='+id,
    url
  ];
}
// สร้างแท็ก <img> ที่ทนต่อการบล็อกของ Google:
// - referrerpolicy="no-referrer" กันการบล็อก hotlink
// - ถ้าลิงก์หลักโหลดไม่ขึ้น จะไล่ลองลิงก์สำรองทีละตัวอัตโนมัติ (onerror)
function imgTag(url,cls){
  if(!url) return '';
  const list=driveImgCandidates(url);
  const src=list[0];
  const rest=list.slice(1).join('|');   // เก็บลิงก์สำรองที่เหลือไว้ใน data-fallbacks
  return `<img ${cls?`class="${cls}" `:''}src="${src}" data-fallbacks="${attr(rest)}" referrerpolicy="no-referrer" loading="lazy" onerror="imgErr(this)" alt="">`;
}
// ลองลิงก์สำรองตัวถัดไป; ถ้าหมดแล้วยังไม่ขึ้น ค่อยซ่อนรูป (ปล่อยให้พื้นหลัง placeholder โชว์แทน)
function imgErr(el){
  const raw=el.getAttribute('data-fallbacks')||'';
  const list=raw.split('|').filter(Boolean);
  if(list.length===0){ el.removeAttribute('data-fallbacks'); el.style.display='none'; return; }
  const next=list.shift();
  el.setAttribute('data-fallbacks', list.join('|'));
  el.src=next;
}
// แปลงช่อง embed: ถ้าวาง "โค้ด iframe เต็ม" มา จะดึง src ออกมาให้ ถ้าวาง URL ตรงๆ ก็ใช้เลย
function embedUrl(val){
  if(!val) return '';
  // ถ้าวางโค้ด <iframe ... src="..."> มา ให้ดึง src ออกมาก่อน
  let m=val.match(/src=["']([^"']+)["']/i);
  let u = m ? m[1] : normUrl(val.trim());

  // --- YouTube (watch / youtu.be / shorts / live / embed) -> /embed/VIDEO_ID ---
  let yt =
      u.match(/youtu\.be\/([\w-]{6,})/) ||
      u.match(/youtube\.com\/(?:watch\?[^#]*\bv=|embed\/|shorts\/|live\/)([\w-]{6,})/) ||
      u.match(/youtube\.com\/v\/([\w-]{6,})/);
  if(yt){
    let id=yt[1];
    let list=u.match(/[?&]list=([\w-]+)/);   // เก็บเพลย์ลิสต์ถ้ามี
    return 'https://www.youtube.com/embed/'+id + (list?('?list='+list[1]):'');
  }
  // เผื่อวางเฉพาะรหัสคลิป 11 ตัว
  if(/^[\w-]{11}$/.test(val.trim())) return 'https://www.youtube.com/embed/'+val.trim();

  // --- Vimeo ---
  let vm=u.match(/vimeo\.com\/(?:video\/)?(\d+)/);
  if(vm) return 'https://player.vimeo.com/video/'+vm[1];

  // --- Google Drive (วิดีโอ/ไฟล์) -> /preview ---
  if(/drive\.google\.com/.test(u)){
    const id=driveImgId(u);
    if(id) return 'https://drive.google.com/file/d/'+id+'/preview';
  }

  // --- Google Forms -> เติม embedded=true ---
  if(/docs\.google\.com\/forms/.test(u) && !/embedded=true/.test(u))
    u += (u.includes('?')?'&':'?')+'embedded=true';

  // Google Maps / อื่น ๆ : ใช้ตามเดิม (ส่วนใหญ่ฝังได้อยู่แล้ว)
  return u;
}

// ดึงรหัสคลิป YouTube จากลิงก์ทุกแบบ (คืน '' ถ้าไม่ใช่ YouTube)
function ytId(val){
  if(!val) return '';
  const m=val.match(/src=["']([^"']+)["']/i); const s=m?m[1]:val;
  const y=s.match(/youtu\.be\/([\w-]{6,})/)||
          s.match(/youtube(?:-nocookie)?\.com\/(?:watch\?[^#]*\bv=|embed\/|shorts\/|live\/|v\/)([\w-]{6,})/);
  if(y) return y[1];
  if(/^[\w-]{11}$/.test(val.trim())) return val.trim();
  return '';
}
// สร้าง HTML สำหรับฝังสื่อ: YouTube ใช้ facade (ภาพปก+ปุ่มเล่น) ที่ทนต่อ error 153,
// สื่ออื่น (ฟอร์ม/แผนที่/ไดรฟ์/Vimeo) ใช้ iframe ตามปกติ
function embedHtml(val){
  if(!val) return '';
  const id=ytId(val);
  if(id){
    const thumb='https://i.ytimg.com/vi/'+id+'/hqdefault.jpg';
    return `<div class="yt-box"><div class="yt-facade" data-yt="${id}" style="background-image:url('${thumb}')">
      <button class="yt-play" aria-label="เล่นวิดีโอ"></button>
      <a class="yt-open" href="https://www.youtube.com/watch?v=${id}" target="_blank" rel="noopener">เปิดบน YouTube ↗</a>
    </div></div>`;
  }
  return `<iframe src="${embedUrl(val)}" loading="lazy" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>`;
}
// กดภาพปก -> โหลด player จริง (user gesture + โดเมน nocookie ลดโอกาส error 153)
function bindEmbeds(scope){
  scope.querySelectorAll('.yt-facade').forEach(el=>{
    el.onclick=(e)=>{
      if(e.target.closest('.yt-open')) return;   // กดลิงก์ "เปิดบน YouTube" ไม่ต้องเล่นในหน้า
      const id=el.dataset.yt;
      el.outerHTML=`<iframe src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0" loading="lazy" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>`;
    };
  });
}
let toastTimer;
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2200);}

function stickyLayout(){
  const eb=$('#editbar'), tb=document.querySelector('.topbar'), tab=$('#tabbar');
  if(!tb||!tab) return;
  const ebH=(eb&&getComputedStyle(eb).display!=='none')?eb.offsetHeight:0;

  tab.style.top=(ebH+tb.offsetHeight)+'px';
}

<!--
================================================================
  ภาคผนวก ก: Apps Script (doPost + doGet) สำหรับอัปโหลดรูปขึ้น Google Drive
  วิธีใช้: เปิด script.google.com > New project > วางโค้ดนี้ >
  Deploy > New deployment > type: Web app >
  Execute as: Me, Who has access: Anyone > นำ URL ไปวางที่
  "โหมดผู้ดูแล > ตั้งค่า > Apps Script Web App URL" (ไม่ต้องแก้ในโค้ด)

  ★★★ สำคัญ: ถ้าเคย Deploy เวอร์ชันเก่าไว้ ต้อง "Manage deployments > แก้ไข >
      New version > Deploy" ใหม่ทุกครั้ง ไม่งั้น doGet ใหม่จะยังไม่ทำงาน ★★★

  หลักการ (เหมือนระบบตัวอย่างที่ได้ผล):
  - doPost: รับไฟล์ -> อัปโหลด -> จดลิงก์ไว้ใน Cache โดยอ้างด้วย key (อายุ 6 ชม.)
  - doGet?key=...: ให้ frontend มาอ่านลิงก์กลับด้วย key เดิม
  (frontend ส่งแบบ no-cors จึงไม่อ่าน response ของ doPost โดยตรง -> เลี่ยงปัญหา CORS)
================================================================
function doPost(e){
  try{
    var p = JSON.parse(e.postData.contents);
    var folder = DriveApp.getFolderById(p.folderId);
    var bytes  = Utilities.base64Decode(p.data);
    var blob   = Utilities.newBlob(bytes, p.mimeType, p.filename);
    var file   = folder.createFile(blob);
    // ตั้งแชร์เป็นสาธารณะ (ห่อ try ไว้ เผื่อองค์กรล็อกการแชร์ จะได้ไม่ทำให้ทั้งฟังก์ชันพัง)
    // ★ ใช้ ANYONE (ไม่ใช่ ANYONE_WITH_LINK) เพื่อให้ endpoint thumbnail แสดงรูปได้ชัวร์สุด
    try { file.setSharing(DriveApp.Access.ANYONE, DriveApp.Permission.VIEW); }
    catch(shareErr) {
      try { file.setSharing(DriveApp.Access.ANYONE_WITH_LINK, DriveApp.Permission.VIEW); } catch(e2) {}
    }
    var id  = file.getId();
    var url = "https://drive.google.com/thumbnail?id=" + id + "&sz=w1600";
    // ★ จดลิงก์ไว้ให้ frontend อ่านกลับด้วย key (Cache อายุ 6 ชม. ล้างเองอัตโนมัติ)
    if (p.key) {
      CacheService.getScriptCache().put('up_' + p.key, url, 21600);
    }
    return ContentService
      .createTextOutput(JSON.stringify({id:id, url:url}))
      .setMimeType(ContentService.MimeType.JSON);
  }catch(err){
    return ContentService.createTextOutput(JSON.stringify({error:String(err)}))
                         .setMimeType(ContentService.MimeType.JSON);
  }
}

function doGet(e){
  var out = {};
  try{
    var key = e && e.parameter ? e.parameter.key : '';
    if (key) {
      out.url = CacheService.getScriptCache().get('up_' + key) || '';
    }
  }catch(err){ out.error = String(err); }
  return ContentService.createTextOutput(JSON.stringify(out))
                       .setMimeType(ContentService.MimeType.JSON);
}

rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {

    // อ่านได้ทุกคน (เว็บสาธารณะ)
    match /{document=**} {
      allow read: if true;
    }

    // ตั้งค่าเว็บ
    match /config/site {
      allow write: if request.resource.data.size() < 25;
    }
    // แท็บ
    match /tabs/{id} {
      allow write: if request.resource.data.keys().hasOnly(['title','type','order'])
                   || request.method == 'delete';
    }
    // บุคลากร / การ์ด
    match /personnel/{id} { allow write: if true; }
    match /items/{id}     { allow write: if true; }
    // ฟอร์ม / ลิงก์
    match /forms/{id}     { allow write: if true; }
    match /linkitems/{id} { allow write: if true; }
    // ข่าว
    match /news/{id}      { allow write: if true; }
    // เนื้อหาอิสระ
    match /content/{id}   { allow write: if true; }
    // เอกสาร/ไฟล์
    match /fileitems/{id} { allow write: if true; }
    // ภาพกิจกรรม
    match /galleryitems/{id} { allow write: if true; }
    // บล็อกเนื้อหาหน้าหลัก
    match /homeblocks/{id} { allow write: if true; }
  }
}
